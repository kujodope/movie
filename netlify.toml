# Netlify configuration for GedaTv
# Static site — no build step needed

[build]
  publish = "."

# SPA-style fallback for clean URLs
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "fullscreen=(*), autoplay=(*)"

# Do not aggressively cache JavaScript files that change app behavior.
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static image/icon assets aggressively
[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
